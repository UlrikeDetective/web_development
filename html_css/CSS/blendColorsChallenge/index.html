<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF 360: Winter Sun Journey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="panorama-viewport">
            <div class="sky-overlay"></div>
            <div class="sky-fog"></div>
            <div class="panorama-bg"></div>
            <div class="lighting-overlay"></div>
            <div class="ground-fog"></div>
            
            <div class="celestial-container">
                <div class="sun-glow"></div>
                <div class="sun"></div>
                <div class="glare"></div>
            </div>
            
            <div class="stars"></div>

            <!-- Bioluminescent Info Box -->
            <div class="info-box" id="infoBox">
                <h2 id="infoTitle">Pacific Night</h2>
                <p id="infoText">The system is in low-power mode...</p>
            </div>
        </div>

        <div class="controls">
            <div class="time-slider-wrapper">
                <input type="range" id="timeSlider" min="0" max="1000" value="0">
                <div class="liquid-arrow" id="liquidArrow">
                    <div class="arrow-head"></div>
                </div>
                <div class="time-display" id="timeDisplay">Midday</div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
