<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF 360: Winter Sun Journey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="panorama-viewport">
            <div class="sky-overlay"></div>
            <div class="sky-fog"></div>
            <div class="panorama-bg"></div>
            <div class="lighting-overlay"></div>
            <div class="ground-fog"></div>
            
            <div class="celestial-container">
                <div class="sun-glow"></div>
                <div class="sun"></div>
                <div class="glare"></div>
            </div>
            
            <div class="stars"></div>

            <!-- Navigation Arrows -->
            <button class="nav-arrow left" id="prevBtn" aria-label="Move Backwards">
                <div class="arrow-shape"></div>
            </button>
            <button class="nav-arrow right" id="nextBtn" aria-label="Move Forwards">
                <div class="arrow-shape"></div>
            </button>

            <!-- Bioluminescent Info Box -->
            <div class="info-box" id="infoBox">
                <h2 id="infoTitle">Pacific Night</h2>
                <p id="infoText">The system is in low-power mode...</p>
            </div>
        </div>

        <div class="controls">
            <div class="time-display-wrapper">
                <div class="time-display" id="timeDisplay">Pacific Night</div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
