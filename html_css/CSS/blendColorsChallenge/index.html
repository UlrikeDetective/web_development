<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Francisco 360: A Day in the Fog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- The 360 Panorama Background -->
        <div class="panorama-viewport">
            <div class="panorama-bg"></div>
            
            <!-- Atmospheric Layers -->
            <div class="sky-overlay"></div>
            <div class="fog-layer"></div>
            
            <!-- Celestial Bodies -->
            <div class="celestial-container">
                <div class="sun"></div>
                <div class="stars"></div>
            </div>
        </div>

        <!-- UI Controls -->
        <div class="controls">
            <div class="time-slider-wrapper">
                <input type="range" id="timeSlider" min="0" max="1000" value="250">
                <div class="liquid-arrow" id="liquidArrow">
                    <div class="arrow-head"></div>
                </div>
                <div class="time-display" id="timeDisplay">Sunrise</div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
